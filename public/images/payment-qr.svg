<svg width="400" height="400" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="400" fill="#f8f9fa" rx="20"/>

  <!-- 二维码图标 -->
  <g transform="translate(120, 80)">
    <!-- 左上角方块 -->
    <rect x="0" y="0" width="60" height="60" fill="none" stroke="#1f9d6d" stroke-width="6" rx="4"/>
    <rect x="15" y="15" width="30" height="30" fill="#1f9d6d" rx="2"/>

    <!-- 右上角方块 -->
    <rect x="100" y="0" width="60" height="60" fill="none" stroke="#1f9d6d" stroke-width="6" rx="4"/>
    <rect x="115" y="15" width="30" height="30" fill="#1f9d6d" rx="2"/>

    <!-- 左下角方块 -->
    <rect x="0" y="100" width="60" height="60" fill="none" stroke="#1f9d6d" stroke-width="6" rx="4"/>
    <rect x="15" y="115" width="30" height="30" fill="#1f9d6d" rx="2"/>

    <!-- 中心随机点阵 -->
    <circle cx="85" cy="35" r="4" fill="#1f9d6d"/>
    <circle cx="100" cy="50" r="4" fill="#1f9d6d"/>
    <circle cx="75" cy="65" r="4" fill="#1f9d6d"/>
    <circle cx="90" cy="80" r="4" fill="#1f9d6d"/>
    <circle cx="105" cy="95" r="4" fill="#1f9d6d"/>
    <circle cx="80" cy="110" r="4" fill="#1f9d6d"/>
    <circle cx="95" cy="125" r="4" fill="#1f9d6d"/>
    <circle cx="35" cy="180" r="4" fill="#1f9d6d"/>
    <circle cx="50" cy="195" r="4" fill="#1f9d6d"/>
    <circle cx="65" cy="180" r="4" fill="#1f9d6d"/>
    <circle cx="80" cy="195" r="4" fill="#1f9d6d"/>
    <circle cx="95" cy="180" r="4" fill="#1f9d6d"/>
    <circle cx="110" cy="195" r="4" fill="#1f9d6d"/>
    <circle cx="125" cy="180" r="4" fill="#1f9d6d"/>
    <circle cx="140" cy="195" r="4" fill="#1f9d6d"/>
  </g>

  <!-- 提示文字 -->
  <text x="200" y="300" font-family="Arial, sans-serif" font-size="18" fill="#374151" text-anchor="middle" font-weight="600">
    收款码
  </text>
  <text x="200" y="325" font-family="Arial, sans-serif" font-size="14" fill="#6b7280" text-anchor="middle">
    请联系管理员配置实际收款码
  </text>
  <text x="200" y="350" font-family="Arial, sans-serif" font-size="12" fill="#9ca3af" text-anchor="middle">
    或设置环境变量 NEXT_PUBLIC_PAYMENT_QR_URL
  </text>
</svg>