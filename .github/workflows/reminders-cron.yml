name: reminders-cron

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"  # 每小时执行一次

jobs:
  process-reminders:
    runs-on: ubuntu-latest
    steps:
      - name: Process scheduled reminders
        run: |
          BASE_URL="${{ secrets.CRON_BASE_URL || 'https://yiyouji.zjsifan.com' }}"
          CRON_SECRET="${{ secrets.CRON_SECRET || secrets.INTERNAL_API_SECRET }}"
          
          curl --fail-with-body -sS -X GET "${BASE_URL}/api/cron/process-reminders" \
            -H "Authorization: Bearer $CRON_SECRET"