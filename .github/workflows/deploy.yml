name: Deploy to Production

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  # 构建和部署
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install

      - name: Build packages
        run: |
          pnpm -C packages/core build
          pnpm -C packages/mcp build
          pnpm -C packages/mcp-server build

      - name: Build Next.js
        run: pnpm build
        env:
          NODE_ENV: production

      - name: Create deploy package
        run: |
          mkdir -p deploy-package
          cp -r .next deploy-package/
          cp -r public deploy-package/
          cp package.json deploy-package/
          cp pnpm-lock.yaml deploy-package/
          ls -la deploy-package/
          tar czf yiyouji-deploy.tar.gz -C deploy-package .
          ls -la yiyouji-deploy.tar.gz

      - name: Upload package to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "yiyouji-deploy.tar.gz"
          target: "/tmp"

      - name: Execute deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            APP_DIR="/opt/apps/yiyouji"
            TIMESTAMP=$(date +%Y%m%d%H%M%S)

            echo "=== 停止旧服务 ==="
            pm2 stop yiyouji 2>/dev/null || true

            echo "=== 备份旧版本 ==="
            if [ -d "$APP_DIR" ]; then
              mv "$APP_DIR" "${APP_DIR}-backup-${TIMESTAMP}" || rm -rf "$APP_DIR"
            fi

            echo "=== 创建目录 ==="
            mkdir -p "$APP_DIR"
            cd "$APP_DIR"

            echo "=== 解压新版本 ==="
            tar xzf /tmp/yiyouji-deploy.tar.gz
            rm -f /tmp/yiyouji-deploy.tar.gz

            echo "=== 创建 .env 文件 ==="
            ENV_FILE="$APP_DIR/.env"
            {
            echo "NODE_ENV=production"
            echo "USE_LOCAL_DB=false"
            echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}"
            echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}"
            echo "SUPABASE_SECRET_KEY=${{ secrets.SUPABASE_SECRET_KEY }}"
            echo "SUPABASE_SYSTEM_ADMIN_EMAIL=${{ secrets.SUPABASE_SYSTEM_ADMIN_EMAIL }}"
            echo "SUPABASE_SYSTEM_ADMIN_PASSWORD=${{ secrets.SUPABASE_SYSTEM_ADMIN_PASSWORD }}"
            echo "SUPABASE_DB_URL=${{ secrets.SUPABASE_DB_URL }}"
            echo "INTERNAL_API_SECRET=${{ secrets.INTERNAL_API_SECRET }}"
            echo "CRON_SECRET=${{ secrets.CRON_SECRET }}"
            echo "ALIYUN_SMS_ACCESS_KEY_ID=${{ secrets.ALIYUN_SMS_ACCESS_KEY_ID }}"
            echo "ALIYUN_SMS_ACCESS_KEY_SECRET=${{ secrets.ALIYUN_SMS_ACCESS_KEY_SECRET }}"
            echo "ALIYUN_SMS_SIGN_NAME=${{ secrets.ALIYUN_SMS_SIGN_NAME }}"
            echo "ALIYUN_SMS_TEMPLATE_CODE=${{ secrets.ALIYUN_SMS_TEMPLATE_CODE }}"
            echo "ALIYUN_SMS_REGION_ID=${{ secrets.ALIYUN_SMS_REGION_ID }}"
            echo "DIFY_API_KEY=${{ secrets.DIFY_API_KEY }}"
            echo "DIFY_API_URL=${{ secrets.DIFY_API_URL }}"
            echo "AMAP_WEB_SERVICE_KEY=${{ secrets.AMAP_WEB_SERVICE_KEY }}"
            echo "VOLC_API_KEY=${{ secrets.VOLC_API_KEY }}"
            echo "DEEPSEEK_API_KEY=${{ secrets.DEEPSEEK_API_KEY }}"
            echo "DEEPSEEK_BASE_URL=${{ secrets.DEEPSEEK_BASE_URL }}"
            echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}"
            echo "MINGAI_FALLBACK_MODELS_JSON=${{ secrets.MINGAI_FALLBACK_MODELS_JSON }}"
            echo "MCP_JWT_SECRET=${{ secrets.MCP_JWT_SECRET }}"
            echo "MCP_HOST=0.0.0.0"
            echo "MCP_ALLOWED_ORIGINS=https://www.mingai.fun,https://mingai.fun"
            echo "MCP_TRUST_PROXY=true"
            echo "MCP_OAUTH_DEBUG=false"
            echo "KNOWLEDGE_BASE_EMBEDDING_MODEL_ID=text-embedding-v4"
            echo "KNOWLEDGE_BASE_RERANK_MODEL_ID=qwen3-rerank"
            echo "VECTOR_SEARCH_ENABLED=false"
            } > "$ENV_FILE"

            echo "=== 安装生产依赖 ==="
            pnpm install --prod

            echo "=== 启动服务 ==="
            pm2 start "pnpm start" --name yiyouji -- -p 3000 2>/dev/null || pm2 restart yiyouji
            pm2 save

            echo "=== 验证服务 ==="
            MAX_RETRIES=30
            RETRY_COUNT=0
            while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
              HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/ || echo "000")
              if [ "$HTTP_CODE" = "200" ]; then
                echo "✅ 部署成功！服务返回 HTTP $HTTP_CODE"
                break
              fi
              echo "等待服务启动... (尝试 $((RETRY_COUNT + 1))/$MAX_RETRIES, HTTP 状态: $HTTP_CODE)"
              sleep 2
              RETRY_COUNT=$((RETRY_COUNT + 1))
            done

            if [ $RETRY_COUNT -eq $MAX_RETRIES ]; then
              echo "❌ 部署失败：服务在规定时间内未正常启动"
              echo "=== 回滚到上一个版本 ==="
              if [ -d "${APP_DIR}-backup-${TIMESTAMP}" ]; then
                pm2 delete yiyouji 2>/dev/null || true
                rm -rf "$APP_DIR"
                mv "${APP_DIR}-backup-${TIMESTAMP}" "$APP_DIR"
                cd "$APP_DIR"
                pm2 start "pnpm start" --name yiyouji -- -p 3000
                pm2 save
                echo "✅ 已回滚到上一个版本"
              fi
              exit 1
            fi

            echo "=== 清理旧备份（保留最近 3 个） ==="
            cd /opt/apps
            ls -dt yiyouji-backup-* 2>/dev/null | tail -n +4 | xargs -r rm -rf