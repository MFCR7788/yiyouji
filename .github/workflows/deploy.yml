name: Deploy to Production

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  # 构建和部署
  deploy:
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 30
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: |
          pnpm -C packages/core build
          pnpm -C packages/mcp build
          pnpm -C packages/mcp-server build

      - name: Build Next.js
        run: pnpm build
        env:
          NODE_ENV: production

      - name: Create optimized deploy package
        run: |
          echo "=== 创建优化后的部署包 ==="
          
          mkdir -p deploy-package
          
          # 只复制必要文件（排除 node_modules, .git 等）
          cp -r .next deploy-package/
          cp -r public deploy-package/
          cp package.json deploy-package/
          cp pnpm-lock.yaml deploy-package/
          
          # 显示包大小
          echo ""
          echo "📦 部署包内容:"
          du -sh deploy-package/*
          echo ""
          echo "📊 总大小:"
          du -sh deploy-package/
          
          # 创建 tar.gz 包
          tar czf yiyouji-deploy.tar.gz -C deploy-package .
          
          echo ""
          echo "✅ 压缩包创建完成:"
          ls -lh yiyouji-deploy.tar.gz
          
          # 验证文件存在且不为空
          if [ ! -s yiyouji-deploy.tar.gz ]; then
            echo "❌ 错误：压缩包创建失败或为空"
            exit 1
          fi

      - name: Upload package to server (with verification)
        id: scp_upload
        uses: appleboy/scp-action@v0.1.7
        continue-on-error: true  # 允许失败以便我们自定义错误处理
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          password: ${{ secrets.SERVER_PASSWORD }}
          source: "yiyouji-deploy.tar.gz"
          target: "/tmp/"
          timeout: "600s"
          command_timeout: "600s"
          debug: true
          overwrite: true

      - name: Verify SCP upload success
        run: |
          echo "=========================================="
          echo "🔍 验证 SCP 上传结果"
          echo "=========================================="
          
          # 检查本地文件是否还存在（SCP 会删除源文件吗？不会，但保险起见检查）
          if [ ! -f yiyouji-deploy.tar.gz ]; then
            echo "⚠️  本地文件已不存在（可能已被清理）"
          else
            echo "✅ 本地文件仍存在"
            ls -lh yiyouji-deploy.tar.gz
          fi
          
          # 清理本地临时文件
          rm -f yiyouji-deploy.tar.gz
          rm -rf deploy-package
          echo "🗑️  本地临时文件已清理"

      - name: Execute deployment (with fallback)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            set -e
            APP_DIR="/opt/apps/yiyouji"
            TIMESTAMP=$(date +%Y%m%d%H%M%S)

            echo "=========================================="
            echo "🚀 开始部署易有吉生产环境"
            echo "=========================================="

            echo ""
            echo "=== 0️⃣ 验证上传的文件 ==="
            
            # 🔧 关键修复：多次检查文件是否存在
            UPLOAD_FILE="/tmp/yiyouji-deploy.tar.gz"
            
            echo "正在查找上传的文件..."
            ls -lh /tmp/*.tar.gz 2>/dev/null || echo "/tmp 目录下无 tar.gz 文件"
            
            if [ ! -f "$UPLOAD_FILE" ]; then
              echo ""
              echo "❌ ❌ ❌ 关键错误：上传的文件不存在！"
              echo ""
              echo "可能的原因:"
              echo "  1. SCP 上传步骤失败"
              echo "  2. 网络连接问题"
              echo "  3. 服务器磁盘空间不足"
              echo "  4. SSH 权限问题"
              echo ""
              echo "=== 诊断信息 ==="
              echo "当前目录:"
              pwd
              echo ""
              echo "/tmp 目录内容:"
              ls -la /tmp/ | tail -20
              echo ""
              echo "磁盘空间:"
              df -h /tmp
              
              # 🔄 尝试备用方案：直接从 Git 拉取代码
              echo ""
              echo "=== 🔄 尝试备用方案：Git 直接拉取 ==="
              
              if [ -d "$APP_DIR/.git" ]; then
                echo "发现 Git 仓库，尝试更新..."
                cd "$APP_DIR"
                git fetch origin master
                git reset --hard origin/master
                
                echo "✅ Git 更新成功"
                
                # 继续执行后续步骤（跳过解压）
                SKIP_UNPACK=true
              else
                echo "❌ 无可用备份方案，无法继续部署"
                exit 1
              fi
            else
              echo "✅ 文件验证通过:"
              ls -lh "$UPLOAD_FILE"
              SKIP_UNPACK=false
            fi

            echo ""
            echo "=== 1️⃣ 检查服务器资源 ==="
            echo "磁盘空间:"
            df -h / | tail -1
            echo ""
            echo "内存使用:"
            free -h | grep Mem

            echo ""
            echo "=== 2️⃣ 停止旧服务 ==="
            pm2 stop yiyouji 2>/dev/null || echo "ℹ️  无运行中的服务"

            echo ""
            echo "=== 3️⃣ 备份旧版本 ==="
            if [ -d "$APP_DIR" ] && [ "$SKIP_UNPACK" != "true" ]; then
              OLD_SIZE=$(du -sh "$APP_DIR" | cut -f1)
              echo "📦 备份旧版本 ($OLD_SIZE)..."
              mv "$APP_DIR" "${APP_DIR}-backup-${TIMESTAMP}" || rm -rf "$APP_DIR"
              echo "✅ 备份完成: ${APP_DIR}-backup-${TIMESTAMP}"
            elif [ "$SKIP_UNPACK" = "true" ]; then
              echo "ℹ️  使用 Git 方式更新，跳过备份"
            else
              echo "ℹ️  无旧版本需要备份"
            fi

            echo ""
            echo "=== 4️⃣ 创建应用目录 ==="
            mkdir -p "$APP_DIR"
            cd "$APP_DIR"

            echo ""
            if [ "$SKIP_UNPACK" = "true" ]; then
              echo "=== 5️⃣ (跳过解压 - 已通过 Git 更新) ==="
            else
              echo "=== 5️⃣ 解压新版本 ==="
              tar xzf "$UPLOAD_FILE"
              rm -f "$UPLOAD_FILE"
              
              echo "✅ 解压完成"
            fi
            
            echo ""
            echo "📂 新版本内容:"
            ls -la

            echo ""
            echo "=== 6️⃣ 创建 .env.local 文件 ==="
            ENV_FILE=".env.local"
            BACKUP_FILE="${ENV_FILE}.backup.$(date +%Y%m%d_%H%M%S)"
            
            # ⭐ 关键修改：保留服务器上已有的微信支付配置
            # 如果服务器上已有 .env 文件，先备份并提取微信支付配置
            WECHAT_PRIVATE_KEY_VALUE=""
            if [ -f "$ENV_FILE" ]; then
                echo "ℹ️  检测到已存在 $ENV_FILE，将备份并保留微信支付私钥"
                cp "$ENV_FILE" "$BACKUP_FILE"
                echo "✅ 已备份到 $BACKUP_FILE"
                
                # 提取微信支付私钥（处理多行私钥情况）
                # 使用 awk 提取 WECHAT_PAY_PRIVATE_KEY 的值（包括多行）
                WECHAT_PRIVATE_KEY_VALUE=$(awk '/^WECHAT_PAY_PRIVATE_KEY="/ {
                    print $0;
                    while (getline) {
                        print $0;
                        if ($0 ~ /"$/) exit;
                    }
                }' "$ENV_FILE")
                
                if [ -n "$WECHAT_PRIVATE_KEY_VALUE" ]; then
                    echo "✅ 已检测到微信支付私钥配置，将保留"
                else
                    echo "ℹ️  未检测到微信支付私钥，将尝试从 GitHub Secrets 获取"
                fi
            fi

            # 使用 echo 命令逐个写入环境变量，确保 GitHub Actions 表达式被正确解析
            echo "NODE_ENV=production" > "$ENV_FILE"
            echo "USE_LOCAL_DB=false" >> "$ENV_FILE"
            echo "" >> "$ENV_FILE"

            # ==================== ⭐ 代理配置（关键！）====================
            echo "# 代理配置 - 生产环境不使用代理" >> "$ENV_FILE"
            echo "ALL_PROXY=" >> "$ENV_FILE"
            echo "all_proxy=" >> "$ENV_FILE"
            echo "HTTP_PROXY=" >> "$ENV_FILE"
            echo "http_proxy=" >> "$ENV_FILE"
            echo "HTTPS_PROXY=" >> "$ENV_FILE"
            echo "https_proxy=" >> "$ENV_FILE"
            echo "NO_PROXY=localhost,127.0.0.1,::1,*.weixin.qq.com,*.qq.com,*.supabase.co" >> "$ENV_FILE"
            echo "" >> "$ENV_FILE"

            # ==================== Supabase 配置 ====================
            echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> "$ENV_FILE"
            echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> "$ENV_FILE"
            echo "SUPABASE_SECRET_KEY=${{ secrets.SUPABASE_SECRET_KEY }}" >> "$ENV_FILE"
            echo "SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" >> "$ENV_FILE"
            echo "SUPABASE_SYSTEM_ADMIN_EMAIL=${{ secrets.SUPABASE_SYSTEM_ADMIN_EMAIL }}" >> "$ENV_FILE"
            echo "SUPABASE_SYSTEM_ADMIN_PASSWORD=${{ secrets.SUPABASE_SYSTEM_ADMIN_PASSWORD }}" >> "$ENV_FILE"
            echo "SUPABASE_DB_URL=${{ secrets.SUPABASE_DB_URL }}" >> "$ENV_FILE"
            echo "" >> "$ENV_FILE"

            # ==================== 内部 API 密钥 ====================
            echo "INTERNAL_API_SECRET=${{ secrets.INTERNAL_API_SECRET }}" >> "$ENV_FILE"
            echo "CRON_SECRET=${{ secrets.CRON_SECRET }}" >> "$ENV_FILE"
            echo "" >> "$ENV_FILE"

            # ==================== AI API 配置 ====================
            echo "DEEPSEEK_API_KEY=${{ secrets.DEEPSEEK_API_KEY }}" >> "$ENV_FILE"
            echo "DEEPSEEK_BASE_URL=${{ secrets.DEEPSEEK_BASE_URL }}" >> "$ENV_FILE"
            echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> "$ENV_FILE"
            echo "VOLC_API_KEY=${{ secrets.VOLC_API_KEY }}" >> "$ENV_FILE"
            echo "" >> "$ENV_FILE"

            # ==================== 第三方服务配置 ====================
            echo "ALIYUN_SMS_ACCESS_KEY_ID=${{ secrets.ALIYUN_SMS_ACCESS_KEY_ID }}" >> "$ENV_FILE"
            echo "ALIYUN_SMS_ACCESS_KEY_SECRET=${{ secrets.ALIYUN_SMS_ACCESS_KEY_SECRET }}" >> "$ENV_FILE"
            echo "ALIYUN_SMS_SIGN_NAME=魔法超人" >> "$ENV_FILE"
            echo "ALIYUN_SMS_TEMPLATE_CODE=SMS_505945199" >> "$ENV_FILE"
            echo "ALIYUN_SMS_REGION_ID=cn-hangzhou" >> "$ENV_FILE"
            echo "" >> "$ENV_FILE"
            echo "DIFY_API_KEY=${{ secrets.DIFY_API_KEY }}" >> "$ENV_FILE"
            echo "DIFY_API_URL=${{ secrets.DIFY_API_URL }}" >> "$ENV_FILE"
            echo "AMAP_WEB_SERVICE_KEY=${{ secrets.AMAP_WEB_SERVICE_KEY }}" >> "$ENV_FILE"
            echo "" >> "$ENV_FILE"

            # ==================== MCP 服务配置 ====================
            echo "MCP_JWT_SECRET=${{ secrets.MCP_JWT_SECRET }}" >> "$ENV_FILE"
            echo "MCP_HOST=0.0.0.0" >> "$ENV_FILE"
            echo "MCP_ALLOWED_ORIGINS=https://www.mingai.fun,https://mingai.fun,yiyouji.zjsifan.com" >> "$ENV_FILE"
            echo "MCP_TRUST_PROXY=true" >> "$ENV_FILE"
            echo "" >> "$ENV_FILE"

            # ==================== 知识库配置 ====================
            echo "KNOWLEDGE_BASE_EMBEDDING_MODEL_ID=text-embedding-v4" >> "$ENV_FILE"
            echo "KNOWLEDGE_BASE_RERANK_MODEL_ID=qwen3-rerank" >> "$ENV_FILE"
            echo "VECTOR_SEARCH_ENABLED=false" >> "$ENV_FILE"
            echo "" >> "$ENV_FILE"

            # ==================== ⭐ 微信支付配置（核心功能）====================
            echo "# 微信支付 - 基础配置" >> "$ENV_FILE"
            echo "WECHAT_PAY_MCHID=1624143377" >> "$ENV_FILE"
            echo "WECHAT_PAY_APPID=wx314d6d3cfbd33e79" >> "$ENV_FILE"
            echo "WECHAT_PAY_API_V3_KEY=SmallFish7788Admin03072298887777" >> "$ENV_FILE"
            echo "WECHAT_PAY_MCH_SERIAL_NO=4C6F7C50450ED26AF84536A143BF7CF0F36D0AD5" >> "$ENV_FILE"
            echo "WECHAT_PAY_NOTIFY_URL=https://yiyouji.zjsifan.com/api/membership/pay/callback" >> "$ENV_FILE"
            echo "WECHAT_PAY_H5_DOMAIN=yiyouji.zjsifan.com" >> "$ENV_FILE"
            echo "" >> "$ENV_FILE"

            # ==================== ⭐ 微信支付私钥（优先从服务器保留配置读取）====================
            echo "# 微信支付私钥" >> "$ENV_FILE"
            
            # 方法 1：优先使用服务器上已有的配置（用户直接设置在服务器上）
            if [ -n "$WECHAT_PRIVATE_KEY_VALUE" ]; then
                echo "$WECHAT_PRIVATE_KEY_VALUE" >> "$ENV_FILE"
                echo "✅ 微信支付私钥已从服务器保留配置"
            # 方法 2：其次尝试从 GitHub Secrets 读取
            elif [ -n "${{ secrets.WECHAT_PRIVATE_KEY }}" ]; then
                printf 'WECHAT_PAY_PRIVATE_KEY="%s"\n' "${{ secrets.WECHAT_PRIVATE_KEY }}" >> "$ENV_FILE"
                echo "✅ 微信支付私钥已从 WECHAT_PRIVATE_KEY Secret 配置"
            elif [ -n "${{ secrets.WECHAT_PAY_PRIVATE_KEY_FULL }}" ]; then
                printf 'WECHAT_PAY_PRIVATE_KEY="%s"\n' "${{ secrets.WECHAT_PAY_PRIVATE_KEY_FULL }}" >> "$ENV_FILE"
                echo "✅ 微信支付私钥已从 WECHAT_PAY_PRIVATE_KEY_FULL Secret 配置"
            else
                echo "⚠️  警告：未检测到微信支付私钥！" >> "$ENV_FILE"
                echo "⚠️  微信支付功能将不可用！" >> "$ENV_FILE"
                echo "" >> "$ENV_FILE"
                echo "WECHAT_PAY_PRIVATE_KEY=" >> "$ENV_FILE"
            fi

            echo "" >> "$ENV_FILE"

            # ==================== 其他配置 ====================
            echo "WEB_PORT=3000" >> "$ENV_FILE"
            echo "" >> "$ENV_FILE"
            echo "# AI 模型降级配置" >> "$ENV_FILE"
            echo "MINGAI_FALLBACK_MODELS_JSON=${{ secrets.MINGAI_FALLBACK_MODELS_JSON }}" >> "$ENV_FILE"

            echo ""
            echo "✅ .env.local 文件创建完成"

            echo ""
            echo "=== 7️⃣ 安装生产依赖 ==="
            echo "⏳ 安装中..."
            pnpm install --prod --no-frozen-lockfile 2>&1 | tail -20
            pnpm store prune 2>/dev/null || true
            echo "✅ 依赖安装完成"

            echo ""
            echo "=== 8️⃣ 启动服务 ==="
            pm2 start "pnpm start" --name yiyouji -- -p 3000 2>/dev/null || pm2 restart yiyouji
            pm2 save
            echo "✅ PM2 服务已启动"
            pm2 status

            echo ""
            echo "=== 9️⃣ 验证服务启动 ==="
            MAX_RETRIES=30
            RETRY_COUNT=0
            while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
              sleep 2
              HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/ || echo "000")
              
              if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "301" ] || [ "$HTTP_CODE" = "302" ]; then
                echo ""
                echo "=========================================="
                echo "🎉 部署成功！服务正常运行"
                echo "=========================================="
                echo "✅ HTTP 状态码: $HTTP_CODE"
                echo "📍 访问地址: https://yiyouji.zjsifan.com"
                echo "⏰ 部署时间: $(date)"
                break
              fi
              
              RETRY_COUNT=$((RETRY_COUNT + 1))
              echo "⏳ 等待服务启动... ($RETRY_COUNT/$MAX_RETRIES, HTTP: $HTTP_CODE)"
            done

            if [ $RETRY_COUNT -eq $MAX_RETRIES ]; then
              echo ""
              echo "❌ 错误：服务未能在规定时间内启动"
              echo ""
              echo "=== 日志 ==="
              pm2 logs yiyouji --lines 50 --nostream
              exit 1
            fi

            echo ""
            echo "=========================================="
            echo "✨ 部署流程全部完成！"
            echo "=========================================="
