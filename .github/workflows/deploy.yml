name: Deploy to Alibaba Cloud

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install

      - name: Build packages
        run: |
          pnpm -C packages/core build
          pnpm -C packages/mcp build
          pnpm -C packages/mcp-server build

      - name: Build Next.js
        run: pnpm build
        env:
          NODE_ENV: production

      - name: List build output (debug)
        run: |
          echo "=== .next directory ==="
          ls -la .next/ || echo ".next not found"
          echo "=== .next/static ==="
          ls -la .next/static/ || echo "static not found"
          echo "=== .next/server ==="
          ls -la .next/server/ || echo "server not found"

      - name: Create deploy package
        run: |
          mkdir -p /tmp/deploy
          
          cp -r .next /tmp/deploy/
          cp -r public /tmp/deploy/
          cp package.json /tmp/deploy/
          cp pnpm-lock.yaml /tmp/deploy/
          
          echo "=== Deploy directory contents ==="
          ls -la /tmp/deploy/
          
          cd /tmp/deploy
          tar czf /tmp/yiyouji-deploy.tar.gz .
          echo "=== Package size ==="
          ls -la /tmp/yiyouji-deploy.tar.gz

      - name: Deploy via SSH
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "/tmp/yiyouji-deploy.tar.gz"
          target: "/tmp"

      - name: Execute deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            APP_DIR="/opt/apps/yiyouji"

            echo "=== 停止旧服务 ==="
            pm2 stop yiyouji 2>/dev/null || true

            echo "=== 备份旧版本 ==="
            if [ -d "$APP_DIR" ]; then
              mv "$APP_DIR" "${APP_DIR}-backup-$(date +%Y%m%d%H%M%S)" 2>/dev/null || rm -rf "$APP_DIR"
            fi

            echo "=== 解压新版本 ==="
            mkdir -p "$APP_DIR"
            cd "$APP_DIR"
            tar xzf /tmp/yiyouji-deploy.tar.gz
            rm -f /tmp/yiyouji-deploy.tar.gz

            echo "=== 安装生产依赖 ==="
            cd "$APP_DIR"
            pnpm install --prod

            echo "=== 启动服务 ==="
            cd "$APP_DIR"
            pm2 start "pnpm start" --name yiyouji -- -p 3000 2>/dev/null || pm2 restart yiyouji
            pm2 save

            echo "=== 验证服务 ==="
            sleep 5
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/)
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ 部署成功！服务返回 HTTP $HTTP_CODE"
            else
              echo "❌ 部署可能失败，服务返回 HTTP $HTTP_CODE"
              exit 1
            fi