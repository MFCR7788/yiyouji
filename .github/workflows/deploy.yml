name: Deploy to Alibaba Cloud

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install

      - name: Build packages
        run: |
          pnpm -C packages/core build
          pnpm -C packages/mcp build
          pnpm -C packages/mcp-server build

      - name: Build Next.js
        id: build-nextjs
        run: |
          pnpm build
          echo "BUILD_SUCCESS=true" >> $GITHUB_OUTPUT
        env:
          NODE_ENV: production

      - name: Verify build output
        run: |
          echo "=== Current directory ==="
          pwd
          echo "=== Directory listing ==="
          ls -la
          echo "=== .next directory ==="
          if [ -d ".next" ]; then
            ls -la .next/
          else
            echo "ERROR: .next directory does not exist!"
            exit 1
          fi

      - name: Create deploy package
        run: |
          mkdir -p /tmp/deploy
          
          echo "=== Copying files ==="
          if [ -d ".next" ]; then
            cp -r .next /tmp/deploy/
            echo "✅ Copied .next directory"
          else
            echo "ERROR: .next directory not found!"
            exit 1
          fi
          
          if [ -d "public" ]; then
            cp -r public /tmp/deploy/
            echo "✅ Copied public directory"
          else
            echo "ERROR: public directory not found!"
            exit 1
          fi
          
          if [ -f "package.json" ]; then
            cp package.json /tmp/deploy/
            echo "✅ Copied package.json"
          else
            echo "ERROR: package.json not found!"
            exit 1
          fi
          
          if [ -f "pnpm-lock.yaml" ]; then
            cp pnpm-lock.yaml /tmp/deploy/
            echo "✅ Copied pnpm-lock.yaml"
          else
            echo "ERROR: pnpm-lock.yaml not found!"
            exit 1
          fi
          
          echo "=== Deploy directory contents ==="
          ls -la /tmp/deploy/
          
          cd /tmp/deploy
          tar czf /tmp/yiyouji-deploy.tar.gz .
          
          echo "=== Package size ==="
          ls -la /tmp/yiyouji-deploy.tar.gz
          
          PACKAGE_SIZE=$(du -b /tmp/yiyouji-deploy.tar.gz | awk '{print $1}')
          if [ "$PACKAGE_SIZE" -lt 1000 ]; then
            echo "ERROR: Package is too small ($PACKAGE_SIZE bytes), likely empty!"
            exit 1
          fi

      - name: Deploy via SSH
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "/tmp/yiyouji-deploy.tar.gz"
          target: "/tmp"

      - name: Execute deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            APP_DIR="/opt/apps/yiyouji"

            echo "=== 停止旧服务 ==="
            pm2 stop yiyouji 2>/dev/null || true

            echo "=== 备份旧版本 ==="
            if [ -d "$APP_DIR" ]; then
              mv "$APP_DIR" "${APP_DIR}-backup-$(date +%Y%m%d%H%M%S)" 2>/dev/null || rm -rf "$APP_DIR"
            fi

            echo "=== 解压新版本 ==="
            mkdir -p "$APP_DIR"
            cd "$APP_DIR"
            tar xzf /tmp/yiyouji-deploy.tar.gz
            rm -f /tmp/yiyouji-deploy.tar.gz

            echo "=== 安装生产依赖 ==="
            cd "$APP_DIR"
            pnpm install --prod

            echo "=== 启动服务 ==="
            cd "$APP_DIR"
            pm2 start "pnpm start" --name yiyouji -- -p 3000 2>/dev/null || pm2 restart yiyouji
            pm2 save

            echo "=== 验证服务 ==="
            sleep 5
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/)
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ 部署成功！服务返回 HTTP $HTTP_CODE"
            else
              echo "❌ 部署可能失败，服务返回 HTTP $HTTP_CODE"
              exit 1
            fi